<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Exam Pro - ASG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --base-text: 18px;
        }

        body {
            background-color: #000000;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .dynamic-text { font-size: var(--base-text) !important; transition: font-size 0.2s ease; }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: linear-gradient(45deg, #1e293b, #0f172a);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        #splash {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .uni-logo {
            font-weight: 900; font-size: 3rem;
            background: linear-gradient(to right, #fbbf24, #0ea5e9, #10b981);
            background-clip: text; -webkit-background-clip: text;
            color: transparent; letter-spacing: -2px;
        }

        .dark-glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .option-btn {
            background: rgba(40, 40, 40, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .selected {
            background: #fff !important;
            color: #000 !important;
            border-color: #fff !important;
            font-weight: bold;
        }

        .config-panel { background: #111; border-left: 1px solid #333; }
        .img-box img { max-width: 100%; border-radius: 15px; border: 1px solid #333; max-height: 300px; object-contain: center; }
        
        /* Scroll personalizado para los números de pregunta */
        .question-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .question-grid::-webkit-scrollbar { width: 4px; }
        .question-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="bg-glow"><div class="blob"></div></div>

    <div id="splash">
        <div class="animate-bounce mb-4"><i class="fa-solid fa-graduation-cap text-6xl text-white"></i></div>
        <h1 class="uni-logo animate-pulse">UNAM • BUAP • UV</h1>
        <p class="text-gray-500 tracking-[0.5em] text-xs mt-4 uppercase">Simulador 2026</p>
    </div>

    <button onclick="toggleConfig()" class="fixed top-6 right-6 z-50 text-gray-400 hover:text-white transition-all">
        <i class="fa-solid fa-ellipsis-vertical text-2xl"></i>
    </button>

    <div id="configMenu" class="hidden fixed inset-0 z-[60] flex justify-end">
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleConfig()"></div>
        <div class="config-panel w-80 h-full p-8 relative z-10 flex flex-col">
            <h3 class="text-xl font-black mb-10 uppercase tracking-tighter">Ajustes</h3>
            <div class="space-y-8">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-black block mb-4 tracking-widest">Tamaño de Fuente</label>
                    <div class="flex gap-2">
                        <button onclick="adjustFont(-2)" class="flex-1 bg-zinc-800 py-4 rounded-2xl hover:bg-zinc-700 font-bold">- A</button>
                        <button onclick="adjustFont(2)" class="flex-1 bg-zinc-800 py-4 rounded-2xl hover:bg-zinc-700 font-bold">+ A</button>
                    </div>
                </div>
                <div class="bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800">
                    <p class="text-[10px] text-gray-500 mb-2 uppercase font-black tracking-widest">Soporte</p>
                    <a href="mailto:adrielserena7@gmail.com" class="flex items-center gap-3 text-blue-400 font-bold break-all">
                        <i class="fa-solid fa-envelope"></i> adrielserena7@gmail.com
                    </a>
                </div>
            </div>
            <div class="mt-auto text-[10px] text-gray-700 text-center uppercase font-black tracking-[0.3em]">ASG PLATFORM v3.2</div>
        </div>
    </div>

    <main id="app" class="max-w-5xl mx-auto px-4 pt-20 pb-10"></main>

<script>
    const SHEET_ID = '1LpWbCciDiWZs94X6if0xct34bGg-Ibrw4UjwFZn5nN4';
    let state = { database: {}, view: 'home', questions: [], index: 0, answers: {}, timeLeft: 180 * 60, timer: null };

    async function loadData() {
        try {
            // Traemos 500 filas para asegurar que no se corte nada
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Preguntas&range=A2:J500`);
            const txt = await res.text();
            const json = JSON.parse(txt.substring(47).slice(0, -2));
            
            // Reinicio total de la base de datos
            state.database = { UNAM: {}, BUAP: {}, UV: {} };

            json.table.rows.forEach(row => {
                if (row.c && row.c[0] && row.c[1]) {
                    const uni = row.c[0].v.toUpperCase();
                    const ver = String(row.c[1].v).trim(); // "Simulacro 1"
                    
                    if (state.database[uni]) {
                        if (!state.database[uni][ver]) state.database[uni][ver] = [];
                        
                        // Guardamos la pregunta
                        state.database[uni][ver].push({
                            num: parseInt(row.c[3]?.v) || 0, // El número de la pregunta (Col D)
                            s: row.c[2]?.v || 'Materia',
                            q: row.c[3]?.v || 'Pregunta',
                            o: [row.c[4]?.v, row.c[5]?.v, row.c[6]?.v, row.c[7]?.v].filter(v => v !== null),
                            a: row.c[8]?.v === 'A' ? 0 : row.c[8]?.v === 'B' ? 1 : row.c[8]?.v === 'C' ? 2 : 3,
                            img: row.c[9]?.v || null
                        });
                    }
                }
            });

            // ORDENAR LAS PREGUNTAS POR EL NÚMERO DE LA COLUMNA D
            Object.keys(state.database).forEach(u => {
                Object.keys(state.database[u]).forEach(v => {
                    state.database[u][v].sort((a, b) => a.num - b.num);
                });
            });
            
            document.getElementById('splash').classList.add('hidden');
            render();
        } catch (e) { console.error(e); }
    }

    function start(uniId) {
        const versiones = Object.keys(state.database[uniId]);
        if (versiones.length === 0) return alert("No hay datos");

        // Usamos la primera versión disponible (Simulacro 1)
        state.questions = [...state.database[uniId][versiones[0]]]; 
        state.index = 0;
        state.answers = {};
        state.view = 'quiz';
        state.timeLeft = 180 * 60;
        
        if(state.timer) clearInterval(state.timer);
        state.timer = setInterval(() => { 
            state.timeLeft--; 
            if(state.timeLeft <= 0) finish(); 
            const el = document.getElementById('timer');
            if(el) {
                const m = Math.floor(state.timeLeft / 60), s = state.timeLeft % 60;
                el.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            }
        }, 1000);
        render();
    }

    function render() {
        const root = document.getElementById('app');
        if (state.view === 'home') {
            root.innerHTML = `<div class="text-center py-20 animate-fade">
                <h1 class="text-5xl font-black mb-10 uppercase">Simulador <span class="text-blue-500">ASG</span></h1>
                <div class="grid md:grid-cols-3 gap-6">
                    ${['UNAM', 'BUAP', 'UV'].map(u => `
                        <button onclick="start('${u}')" class="dark-glass p-10 rounded-[2rem] hover:border-blue-500 transition-all font-black text-2xl">${u}</button>
                    `).join('')}
                </div>
            </div>`;
        } else if (state.view === 'quiz') {
            const q = state.questions[state.index];
            root.innerHTML = `
            <div class="grid lg:grid-cols-4 gap-8">
                <div class="lg:col-span-1 space-y-4">
                    <div class="dark-glass p-6 rounded-2xl text-center text-3xl font-mono" id="timer">180:00</div>
                    <div class="dark-glass p-4 rounded-2xl">
                        <div class="grid grid-cols-5 gap-2 max-h-[400px] overflow-y-auto pr-2">
                            ${state.questions.map((_, i) => `
                                <button onclick="state.index=${i};render()" 
                                    class="h-10 rounded-lg text-[10px] font-bold ${state.index === i ? 'bg-white text-black' : (state.answers[i] !== undefined ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-gray-400')}">
                                    ${i+1}
                                </button>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-3 dark-glass p-8 md:p-12 rounded-[3rem]">
                    <div class="flex justify-between text-[10px] font-black text-gray-500 uppercase mb-8 tracking-widest">
                        <span>${q.s}</span>
                        <span>PREGUNTA ${state.index + 1} DE ${state.questions.length}</span>
                    </div>
                    ${q.img ? `<div class="mb-8 flex justify-center bg-white/5 p-4 rounded-2xl border border-white/10"><img src="${q.img}" class="max-h-64 object-contain"></div>` : ''}
                    <h2 class="text-xl font-bold mb-10 text-white leading-relaxed">${q.q}</h2>
                    <div class="grid gap-3">
                        ${q.o.map((opt, i) => `
                            <button onclick="state.answers[state.index]=${i};render()" class="w-full p-6 rounded-2xl text-left flex items-center gap-6 border-2 transition-all ${state.answers[state.index] === i ? 'bg-white text-black border-white' : 'bg-zinc-900/50 border-white/5 text-gray-300 hover:border-white/20'}">
                                <span class="w-8 h-8 rounded-full bg-black/20 flex items-center justify-center text-xs font-black">${String.fromCharCode(65+i)}</span>
                                <div class="flex-1">${String(opt).startsWith('http') ? `<img src="${opt}" class="max-h-20">` : opt}</div>
                            </button>`).join('')}
                    </div>
                    <div class="flex justify-between mt-12 pt-8 border-t border-white/5">
                        <button onclick="if(state.index>0){state.index--;render()}" class="text-gray-500 font-bold hover:text-white transition">← ANTERIOR</button>
                        <button onclick="if(state.index<state.questions.length-1){state.index++;render()}else{finish()}" class="bg-blue-600 px-10 py-4 rounded-2xl font-black shadow-lg shadow-blue-500/20">SIGUIENTE →</button>
                    </div>
                </div>
            </div>`;
        } else if (state.view === 'results') {
            let score = 0;
            state.questions.forEach((q, i) => { if(state.answers[i] === q.a) score++; });
            root.innerHTML = `<div class="max-w-xl mx-auto text-center p-16 dark-glass rounded-[4rem]">
                <h2 class="text-xl font-black text-gray-500 mb-4 tracking-widest">PUNTAJE FINAL</h2>
                <div class="text-[10rem] font-black leading-none mb-6">${score}</div>
                <button onclick="location.reload()" class="bg-white text-black w-full py-6 rounded-3xl font-black text-xl hover:invert transition">NUEVO INTENTO</button>
            </div>`;
        }
    }

    function finish() { clearInterval(state.timer); state.view = 'results'; render(); }
    loadData();
</script>
</body>
</html>
