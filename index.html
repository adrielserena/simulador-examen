<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Exam Pro - ASG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --accent-unam: #fbbf24;
            --accent-buap: #0ea5e9;
            --accent-uv: #10b981;
            --base-text: 16px;
        }

        body {
            background-color: #000000;
            color: #e2e8f0;
            font-size: var(--base-text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: font-size 0.2s ease;
        }

        /* Fondo Interactivo Animado */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: linear-gradient(45deg, #1e293b, #0f172a);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

       .uni-logo {
    font-weight: 900;
    font-size: 3rem;
    background: linear-gradient(to right, #fbbf24, #0ea5e9, #10b981);
    background-clip: text; /* Versión estándar */
    -webkit-background-clip: text; /* Mantenemos esta para iPhones/Safari */
    color: transparent; /* En lugar de -webkit-text-fill-color */
    letter-spacing: -2px;
}


        /* Glass Cards modo Oscuro */
        .dark-glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .option-btn {
            background: rgba(40, 40, 40, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-btn:hover {
            background: rgba(60, 60, 60, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .selected {
            background: #fff !important;
            color: #000 !important;
            border-color: #fff !important;
            transform: scale(1.02);
            font-weight: bold;
        }

        /* Ajustes de Configuración */
        .config-panel {
            background: #111;
            border-left: 1px solid #333;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .img-box img {
            max-width: 100%;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="blob"></div>
    </div>

    <div id="splash">
        <div class="animate-bounce mb-4">
            <i class="fa-solid fa-graduation-cap text-6xl text-white"></i>
        </div>
        <h1 class="uni-logo animate-pulse">UNAM • BUAP • UV</h1>
        <p class="text-gray-500 tracking-[0.5em] text-xs mt-4 uppercase">Simulador 2026</p>
    </div>

    <button onclick="toggleConfig()" id="btnConfig" class="fixed top-6 right-6 z-50 text-gray-400 hover:text-white transition-transform hover:rotate-45">
        <i class="fa-solid fa-ellipsis-vertical text-2xl"></i>
    </button>

    <div id="configMenu" class="hidden fixed inset-0 z-[60] flex justify-end">
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleConfig()"></div>
        <div class="config-panel w-80 h-full p-8 relative z-10 flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-xl font-black">AJUSTES</h3>
                <button onclick="toggleConfig()"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="space-y-8">
                <div>
                    <label class="text-xs text-gray-500 uppercase font-bold block mb-4">Tamaño de Texto</label>
                    <div class="flex gap-2">
                        <button onclick="adjustFont(-2)" class="flex-1 bg-zinc-800 py-3 rounded-xl hover:bg-zinc-700">- A</button>
                        <button onclick="adjustFont(2)" class="flex-1 bg-zinc-800 py-3 rounded-xl hover:bg-zinc-700">+ A</button>
                    </div>
                </div>

                <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                    <p class="text-xs text-gray-500 mb-2 uppercase font-bold">Ayuda</p>
                    <a href="https://wa.me/522261000000" class="flex items-center gap-3 text-blue-400 font-bold">
                        <i class="fa-brands fa-whatsapp"></i> Soporte Adriel
                    </a>
                </div>
            </div>

            <div class="mt-auto text-[10px] text-gray-600 text-center">
                PLATAFORMA ASG v3.0 • VERACRUZ
            </div>
        </div>
    </div>

    <main id="app" class="max-w-5xl mx-auto px-4 pt-20 pb-10">
        </main>

    <script>
        const SHEET_ID = '1LpWbCciDiWZs94X6if0xct34bGg-Ibrw4UjwFZn5nN4';
        let fontSize = 16;
        
        let state = {
            database: { UNAM: {}, BUAP: {}, UV: {} },
            view: 'home',
            questions: [],
            index: 0,
            answers: {},
            timeLeft: 0,
            timer: null
        };

        // Splash Screen Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.classList.add('hidden'), 800);
            }, 2500);
        });

        async function loadData() {
            try {
                // Rango A a J para incluir la columna de imagen
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Preguntas&range=A2:J`;
                const res = await fetch(url);
                const txt = await res.text();
                const json = JSON.parse(txt.substring(47).slice(0, -2));

                json.table.rows.forEach(row => {
                    const uni = row.c[0]?.v?.toUpperCase();
                    const ver = row.c[1]?.v || '';
                    if (uni && state.database[uni]) {
                        if (!state.database[uni][ver]) state.database[uni][ver] = [];
                        state.database[uni][ver].push({
                            s: row.c[2]?.v || '', // Materia
                            q: row.c[3]?.v || '', // Pregunta
                            o: [row.c[4]?.v, row.c[5]?.v, row.c[6]?.v, row.c[7]?.v].filter(v => v),
                            a: row.c[8]?.v === 'A' ? 0 : row.c[8]?.v === 'B' ? 1 : row.c[8]?.v === 'C' ? 2 : 3,
                            img: row.c[9]?.v || null // Columna J: Link Imagen
                        });
                    }
                });
                render();
            } catch (e) { console.error(e); }
        }

        function adjustFont(n) {
            fontSize = Math.max(12, Math.min(24, fontSize + n));
            document.documentElement.style.setProperty('--base-text', fontSize + 'px');
        }

        function toggleConfig() {
            document.getElementById('configMenu').classList.toggle('hidden');
        }

        function render() {
            const root = document.getElementById('app');
            
            if (state.view === 'home') {
                root.innerHTML = `
                <div class="text-center py-20 animate-fade">
                    <h1 class="text-5xl font-black mb-10 tracking-tighter">SIMULADOR <span class="text-blue-500">PRO</span></h1>
                    <div class="grid md:grid-cols-3 gap-6">
                        <button onclick="start('UNAM')" class="dark-glass p-8 rounded-[2.5rem] hover:border-yellow-500 transition-all">
                            <div class="w-12 h-12 bg-yellow-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-shield-halved text-yellow-500"></i>
                            </div>
                            <h3 class="text-2xl font-black">UNAM</h3>
                            <p class="text-gray-500 text-sm mt-2">Área 1 y 2</p>
                        </button>
                        <button onclick="start('BUAP')" class="dark-glass p-8 rounded-[2.5rem] hover:border-blue-500 transition-all">
                            <div class="w-12 h-12 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-atom text-blue-500"></i>
                            </div>
                            <h3 class="text-2xl font-black">BUAP</h3>
                            <p class="text-gray-500 text-sm mt-2">Examen General</p>
                        </button>
                        <button onclick="start('UV')" class="dark-glass p-8 rounded-[2.5rem] hover:border-green-500 transition-all">
                            <div class="w-12 h-12 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-leaf text-green-500"></i>
                            </div>
                            <h3 class="text-2xl font-black">UV</h3>
                            <p class="text-gray-500 text-sm mt-2">EXANI-II</p>
                        </button>
                    </div>
                </div>`;
            } else if (state.view === 'quiz') {
                const q = state.questions[state.index];
                root.innerHTML = `
                <div class="grid lg:grid-cols-4 gap-8">
                    <div class="lg:col-span-1 space-y-4">
                        <div class="dark-glass p-6 rounded-3xl text-center">
                            <div id="timer" class="text-3xl font-mono font-black text-white">00:00</div>
                        </div>
                        <div class="dark-glass p-4 rounded-3xl grid grid-cols-5 gap-2">
                            ${state.questions.map((_, i) => `
                                <button onclick="state.index=${i};render()" class="h-10 rounded-lg text-[10px] font-bold ${state.index === i ? 'bg-white text-black' : (state.answers[i] !== undefined ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-gray-500')}">
                                    ${i + 1}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="lg:col-span-3 space-y-6">
                        <div class="dark-glass p-8 md:p-12 rounded-[3rem]">
                            <div class="flex justify-between mb-8">
                                <span class="bg-zinc-800 px-4 py-1 rounded-full text-[10px] font-black text-gray-400 uppercase tracking-widest">${q.s}</span>
                                <span class="text-xs text-gray-600 font-bold">Paso ${state.index + 1} de ${state.questions.length}</span>
                            </div>

                            ${q.img ? `<div class="img-box mb-8 flex justify-center bg-white/5 p-4 rounded-2xl"><img src="${q.img}"></div>` : ''}

                            <h2 class="text-2xl md:text-3xl font-bold mb-10 leading-snug">${q.q}</h2>

                            <div class="grid gap-4">
                                ${q.o.map((opt, i) => {
                                    const isImg = opt.startsWith('http');
                                    return `
                                    <button onclick="state.answers[state.index]=${i};render()" class="option-btn w-full p-6 rounded-2xl flex items-center gap-6 ${state.answers[state.index] === i ? 'selected' : ''}">
                                        <span class="w-10 h-10 rounded-full bg-black/20 flex items-center justify-center font-black">${String.fromCharCode(65+i)}</span>
                                        <div class="flex-1 text-left">
                                            ${isImg ? `<img src="${opt}" class="max-h-24 mx-auto">` : `<span>${opt}</span>`}
                                        </div>
                                    </button>`;
                                }).join('')}
                            </div>

                            <div class="flex justify-between mt-12 pt-8 border-t border-white/5">
                                <button onclick="if(state.index>0){state.index--;render()}" class="text-gray-500 font-bold hover:text-white transition">← ANTERIOR</button>
                                <button onclick="if(state.index<state.questions.length-1){state.index++;render()}else{finish()}" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black hover:scale-105 transition shadow-lg shadow-blue-500/20">
                                    ${state.index === state.questions.length - 1 ? 'TERMINAR' : 'SIGUIENTE →'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
                updateTimer();
            } else if (state.view === 'results') {
                let score = 0;
                state.questions.forEach((q, i) => { if(state.answers[i] === q.a) score++; });
                root.innerHTML = `
                <div class="max-w-xl mx-auto dark-glass p-16 rounded-[4rem] text-center">
                    <h2 class="text-2xl font-black text-gray-400 uppercase tracking-widest mb-4">Resultado Final</h2>
                    <div class="text-[10rem] font-black leading-none text-white mb-4">${score}</div>
                    <p class="text-xl text-gray-500 font-bold mb-12">ACIERTOS TOTALES</p>
                    <button onclick="location.reload()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-lg hover:invert transition">VOLVER AL INICIO</button>
                </div>`;
            }
        }

        function start(id) {
            const versions = Object.keys(state.database[id]);
            const ver = versions[0];
            state.questions = state.database[id][ver];
            state.timeLeft = 180 * 60;
            state.view = 'quiz';
            state.index = 0;
            state.answers = {};
            if(state.timer) clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.timeLeft--;
                if(state.timeLeft <= 0) finish();
                updateTimer();
            }, 1000);
            render();
        }

        function updateTimer() {
            const el = document.getElementById('timer');
            if(el) {
                const m = Math.floor(state.timeLeft / 60);
                const s = state.timeLeft % 60;
                el.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            }
        }

        function finish() { clearInterval(state.timer); state.view = 'results'; render(); }
        loadData();
    </script>
</body>
</html>
