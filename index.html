<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Exam Pro - ASG</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6d28d9">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #6d28d9;
            --secondary: #db2777;
            --accent: #2563eb;
        }

        /* Temas Dinámicos */
        .theme-unam { --primary: #78350f; --secondary: #d97706; --accent: #fbbf24; }
        .theme-buap { --primary: #1e3a8a; --secondary: #0ea5e9; --accent: #bae6fd; }
        .theme-uv { --primary: #064e3b; --secondary: #10b981; --accent: #a7f3d0; }

        body {
            background-color: var(--primary);
            background-image: 
                radial-gradient(at 10% 10%, var(--secondary) 0px, transparent 50%),
                radial-gradient(at 90% 90%, var(--accent) 0px, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 100% 100%, 100% 100%, 20px 20px;
            transition: all 0.5s ease;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover:not(.selected) { transform: translateX(8px); background: #f8fafc; }
        
        .selected {
            border-color: var(--secondary) !important;
            background-color: white !important;
            color: var(--primary) !important;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            font-weight: 800;
        }

        .active-q { transform: scale(1.1); background: var(--secondary) !important; color: white !important; }
        .answered { background: #10b981 !important; color: white !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }

        /* Modal de Configuración */
        #config-modal { display: none; }
        #config-modal.active { display: flex; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans antialiased text-slate-800">
    
    <button onclick="toggleConfig()" class="fixed bottom-6 right-6 z-50 bg-white/20 backdrop-blur-md p-4 rounded-full shadow-2xl hover:rotate-90 transition-all duration-500 border border-white/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </button>

    <div id="config-modal" class="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4">
        <div class="glass-card max-w-md w-full p-8 rounded-[2rem] shadow-2xl animate-fade">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-slate-800">Ajustes del Sistema</h3>
                <button onclick="toggleConfig()" class="text-slate-400 hover:text-red-500 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="space-y-6">
                <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Soporte Técnico</p>
                    <p class="text-sm text-slate-600 mb-4">¿Encontraste un error en una pregunta o tienes alguna duda?</p>
                    <a href="mailto:adrielserena7@gmail.com" class="block w-full bg-slate-900 text-white text-center py-3 rounded-xl font-bold hover:bg-slate-800 transition">Contactar a Adriel</a>
                </div>
                <div class="text-center">
                    <p class="text-xs text-slate-400 font-medium">Plataforma Adriel v2.0 • 2026<br>Diseñada para Veracruz, México.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-6xl mx-auto">
        <div id="loading" class="text-center mt-32 text-white animate-pulse">
            <h2 class="text-4xl font-black mb-4 tracking-tighter">Sincronizando Datos...</h2>
            <p class="text-xl opacity-70">Conectando con Google Sheets Pro</p>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        const SHEET_ID = '1LpWbCciDiWZs94X6if0xct34bGg-Ibrw4UjwFZn5nN4';
        
        const EXAM_CONFIGS = {
            UNAM: { name: "UNAM Área 1", time: 180 * 60, theme: 'theme-unam' },
            BUAP: { name: "EXANI-II BUAP", time: 300 * 60, theme: 'theme-buap' },
            UV: { name: "EXANI-II UV", time: 180 * 60, theme: 'theme-uv' }
        };

        let state = {
            loaded: false,
            database: { UNAM: {}, BUAP: {}, UV: {} },
            view: 'home',
            currentExamId: null,
            currentVersion: null,
            questions: [],
            index: 0,
            answers: {},
            timeLeft: 0,
            timer: null
        };

        async function loadSheetData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Preguntas&range=A2:I`;
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                
                json.table.rows.forEach(row => {
                    const uni = row.c[0]?.v || '';
                    const ver = row.c[1]?.v || '';
                    if (uni && ver && EXAM_CONFIGS[uni.toUpperCase()]) {
                        const uniKey = uni.toUpperCase();
                        if (!state.database[uniKey][ver]) state.database[uniKey][ver] = [];
                        state.database[uniKey][ver].push({
                            s: row.c[2]?.v || '', 
                            q: row.c[3]?.v || '',
                            o: [row.c[4]?.v, row.c[5]?.v, row.c[6]?.v, row.c[7]?.v].filter(v => v),
                            a: row.c[8]?.v === 'A' ? 0 : row.c[8]?.v === 'B' ? 1 : row.c[8]?.v === 'C' ? 2 : 3
                        });
                    }
                });
                state.loaded = true;
                render();
            } catch (e) {
                document.getElementById('loading').innerHTML = `<h2 class="text-red-200 text-3xl font-black">Error de Conexión</h2>`;
            }
        }

        function toggleConfig() {
            document.getElementById('config-modal').classList.toggle('active');
        }

        function updateTimerDisplay() {
            const timerDoc = document.getElementById('timer-display');
            if(timerDoc) {
                const m = Math.floor(state.timeLeft / 60);
                const s = state.timeLeft % 60;
                timerDoc.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(state.timeLeft < 300) timerDoc.classList.add('text-red-500');
            }
        }

        function render() {
            if (!state.loaded) return;
            const root = document.getElementById('app');
            
            // Aplicar tema según universidad
            document.body.className = "min-h-screen p-4 md:p-8 font-sans antialiased text-slate-800 " + 
                (state.currentExamId ? EXAM_CONFIGS[state.currentExamId].theme : '');

            if (state.view === 'home') {
                root.innerHTML = `
                <div class="text-center mt-12 py-16 glass-card rounded-[3rem] shadow-2xl px-8 animate-fade">
                    <h1 class="text-6xl font-black text-slate-900 mb-4 tracking-tighter">Plataforma Adriel</h1>
                    <p class="text-slate-500 text-xl mb-12 font-medium">Simuladores de Admisión 2026</p>
                    <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
                        ${Object.keys(EXAM_CONFIGS).map(id => {
                            const hasData = Object.keys(state.database[id]).length > 0;
                            return `
                            <button onclick="startExam('${id}')" class="group bg-white p-8 rounded-[2rem] shadow-xl hover:-translate-y-2 transition-all border-b-8 border-slate-200 ${!hasData ? 'opacity-50 cursor-not-allowed' : 'hover:border-indigo-500'}" ${!hasData ? 'disabled' : ''}>
                                <div class="text-left">
                                    <span class="text-xs font-black text-indigo-500 uppercase tracking-widest">${id}</span>
                                    <h3 class="text-2xl font-black text-slate-800 mt-1">${EXAM_CONFIGS[id].name}</h3>
                                    <p class="text-slate-400 text-sm mt-4 font-bold">${EXAM_CONFIGS[id].time/60} minutos</p>
                                </div>
                            </button>`;
                        }).join('')}
                    </div>
                </div>`;
            } else if (state.view === 'quiz') {
                const q = state.questions[state.index];
                root.innerHTML = `
                <div class="grid md:grid-cols-4 gap-6 animate-fade">
                    <div class="glass-card p-6 rounded-[2rem] shadow-xl h-fit">
                        <div id="timer-display" class="text-4xl font-mono font-black mb-8 text-center text-slate-800 tabular-nums">00:00</div>
                        <div class="grid grid-cols-5 gap-2 mb-8">
                            ${state.questions.map((_, i) => `
                                <button onclick="state.index=${i};render()" class="aspect-square text-[10px] rounded-lg font-bold transition ${state.index === i ? 'active-q' : (state.answers[i] !== undefined ? 'answered' : 'bg-slate-100 text-slate-400')}">
                                    ${i + 1}
                                </button>
                            `).join('')}
                        </div>
                        <button onclick="finish()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-widest text-xs hover:bg-slate-800 transition">Finalizar</button>
                    </div>
                    <div class="md:col-span-3 bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-slate-50">
                        <div class="flex justify-between items-center mb-10">
                            <span class="px-4 py-1.5 rounded-full bg-slate-100 text-slate-600 font-black text-[10px] uppercase tracking-tighter">${q.s}</span>
                            <span class="text-xs font-bold text-slate-300">Pregunta ${state.index + 1}/${state.questions.length}</span>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-900 mb-10 leading-tight">${q.q}</h2>
                        <div class="space-y-4">
                            ${q.o.map((opt, i) => `
                                <button onclick="state.answers[state.index]=${i};render()" class="option-btn w-full text-left p-5 rounded-2xl border-2 border-slate-50 flex items-center ${state.answers[state.index] === i ? 'selected' : 'bg-slate-50/50'}">
                                    <span class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm font-black mr-4 text-slate-400">${String.fromCharCode(65+i)}</span>
                                    <span class="font-bold text-slate-700">${opt}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div class="flex justify-between mt-12">
                            <button onclick="if(state.index>0){state.index--;render()}" class="text-slate-400 font-black text-sm hover:text-slate-600 transition">ANTERIOR</button>
                            <button onclick="if(state.index<state.questions.length-1){state.index++;render()}" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-black text-sm hover:scale-105 transition">SIGUIENTE</button>
                        </div>
                    </div>
                </div>`;
                updateTimerDisplay();
            } else if (state.view === 'results') {
                let correctas = 0;
                state.questions.forEach((q, i) => { if(state.answers[i] === q.a) correctas++; });
                root.innerHTML = `
                <div class="max-w-2xl mx-auto glass-card p-12 rounded-[3rem] shadow-2xl text-center animate-fade">
                    <h2 class="text-3xl font-black mb-2">Resultado Final</h2>
                    <div class="text-[8rem] font-black text-slate-900 leading-none my-8">${correctas}</div>
                    <p class="text-slate-500 font-bold mb-10 uppercase tracking-widest text-sm">Aciertos totales de ${state.questions.length}</p>
                    <button onclick="location.reload()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black hover:scale-105 transition">NUEVO INTENTO</button>
                </div>`;
            }
        }

        function startExam(id) {
            const versions = Object.keys(state.database[id]);
            const randomVersion = versions[Math.floor(Math.random() * versions.length)];
            const pool = state.database[id][randomVersion];
            
            state.questions = pool.length > 120 ? pool.sort(() => 0.5 - Math.random()).slice(0, 120) : pool;
            state.currentExamId = id;
            state.currentVersion = randomVersion;
            state.timeLeft = EXAM_CONFIGS[id].time;
            state.view = 'quiz';
            state.index = 0;
            state.answers = {};
            
            if(state.timer) clearInterval(state.timer);
            state.timer = setInterval(() => { 
                state.timeLeft--; 
                if(state.timeLeft <= 0) finish();
                updateTimerDisplay();
            }, 1000);
            render();
        }

        function finish() { clearInterval(state.timer); state.view = 'results'; render(); }
        loadSheetData();
    </script>
</body>
</html>
